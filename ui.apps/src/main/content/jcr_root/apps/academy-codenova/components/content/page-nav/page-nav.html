<sly data-sly-use.links="com.reponse.mvn.core.models.UtilityLinksModel">
<nav class="cl-page-nav">
	<div class="cl-page-nav__inner page-section">
		<ul class="cl-page-nav__list" data-sly-test="${links.items.size > 0}">
			<sly data-sly-list.item="${links.items}">
				<li class="cl-page-nav__item">
					<sly data-sly-test="${item.url}">
						<a href="${item.url @ extension='html'}" class="cl-page-nav__link">${item.label}</a>
					</sly>
					<sly data-sly-test="${!item.url}">
						<span class="cl-page-nav__link cl-page-nav__link--nolink">${item.label}</span>
					</sly>
				</li>
			</sly>
		</ul>
		<span
			class="cl-page-nav__empty"
			data-sly-test="${wcmmode.edit && links.items.size == 0}"
		>
			[Configure Page Navigation]
		</span>
	</div>
</nav>
</sly>
