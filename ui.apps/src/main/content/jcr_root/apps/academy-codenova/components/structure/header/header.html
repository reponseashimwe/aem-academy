<div
	class="cl-header"
	data-sly-use.nav="com.reponse.mvn.core.models.NavigationModel"
	data-sly-test.isHomepage="${nav.isHomePage}"
	data-sly-use.header="com.reponse.mvn.core.models.CodelandHeaderModel"
>
	<sly data-sly-set.useDefaultLogoIcon="${properties.useDefaultLogoIcon == null || properties.useDefaultLogoIcon == 'true'}"/>
	<sly data-sly-set.hasLogoAsset="${properties.logoAssetReference}"/>
	<!-- Top utility bar -->
	<div class="cl-header__utils">
		<div class="cl-container-wide">
			<div class="cl-header__utils-inner">
				<ul
					class="cl-header__utils-list"
					data-sly-test="${header.utilLinks.size > 0}"
				>
					<li data-sly-list.link="${header.utilLinks}">
						<sly data-sly-test="${link.url}">
							<a
								href="${link.url @ extension='html'}"
								class="cl-header__utils-link"
							>
								<span class="cl-header__utils-text">${link.label}</span>
								<i
									class="cl-header__utils-icon cl-icon-${link.icon}"
									data-sly-test="${link.icon}"
								></i>
							</a>
						</sly>
						<sly data-sly-test="${!link.url}">
							<span class="cl-header__utils-link">
								<span class="cl-header__utils-text">${link.label}</span>
								<i
									class="cl-header__utils-icon cl-icon-${link.icon}"
									data-sly-test="${link.icon}"
								></i>
							</span>
						</sly>
					</li>
				</ul>
				<div class="cl-header__utils-right">
					<a
						href="#"
						class="cl-header__utils-link cl-header__utils-link--lang"
					>
						${properties.languageLabel || 'IT'}
						<i
							class="cl-header__lang-caret cl-icon-chevron"
							aria-hidden="true"
						></i>
					</a>
				</div>
			</div>
		</div>
	</div>

	<!-- Main header -->
	<div class="cl-header__main">
		<div class="cl-container">
			<div class="cl-header__main-inner">
				<!-- Logo -->
				<a
					href="${nav.rootPage.path @ extension='html'}"
					class="cl-header__logo"
				>
					<i
						class="cl-icon-${properties.logoIcon || 'logo'}"
						aria-label="${properties.logoAltText || 'Codeland'}"
						data-sly-test="${useDefaultLogoIcon || !hasLogoAsset}"
					></i>
					<img
						class="cl-header__logo-image"
						src="${properties.logoAssetReference}"
						alt="${properties.logoAltText || 'Codeland'}"
						loading="eager"
						data-sly-test="${!useDefaultLogoIcon && hasLogoAsset}"
					/>
				</a>

				<!-- Desktop navigation -->
				<nav
					class="cl-header__nav"
					data-sly-test="${nav.rootPage}"
				>
					<ul class="cl-header__nav-list">
						<li
							data-sly-repeat.page="${nav.rootPage.listChildren}"
							data-sly-test="${!page.hideInNav}"
						>
							<a
								href="${page.path @ extension='html'}"
								class="cl-header__nav-link ${page.path == currentPage.path ? 'cl-header__nav-link--active' : ''}"
							>
								${page.title || page.name}
							</a>
						</li>
					</ul>
				</nav>

				<!-- Search + Mobile Toggle -->
				<div class="cl-header__actions">
					<button
						class="cl-header__search"
						aria-label="Search"
						data-sly-test="${properties.showSearch != 'false'}"
					>
						<i class="cl-icon-search"></i>
					</button>
					<button
						class="cl-header__toggle"
						aria-label="Toggle menu"
						data-header-toggle
					>
						<i
							class="cl-header__toggle-icon cl-icon-menu"
							aria-hidden="true"
						></i>
					</button>
				</div>
			</div>
		</div>
	</div>

	<!-- Mobile menu overlay -->
	<div
		class="cl-header__mobile"
		data-header-menu
	>
		<div class="cl-header__mobile-inner">
			<!-- Mobile header -->
			<div class="cl-header__mobile-header">
				<a
					href="${nav.rootPage.path @ extension='html'}"
					class="cl-header__logo"
				>
					<i
						class="cl-icon-${properties.logoIcon || 'logo'}"
						aria-label="${properties.logoAltText || 'Codeland'}"
						data-sly-test="${useDefaultLogoIcon || !hasLogoAsset}"
					></i>
					<img
						class="cl-header__logo-image"
						src="${properties.logoAssetReference}"
						alt="${properties.logoAltText || 'Codeland'}"
						loading="eager"
						data-sly-test="${!useDefaultLogoIcon && hasLogoAsset}"
					/>
				</a>
				<button
					class="cl-header__close"
					aria-label="Close menu"
					data-header-toggle
				>
					<i class="cl-icon-cross"></i>
				</button>
			</div>

			<!-- Mobile navigation -->
			<nav
				class="cl-header__mobile-nav"
				data-sly-test="${nav.rootPage}"
			>
				<ul class="cl-header__mobile-list">
					<li
						data-sly-repeat.page="${nav.rootPage.listChildren}"
						data-sly-test="${!page.hideInNav}"
					>
						<a
							href="${page.path @ extension='html'}"
							class="cl-header__mobile-link ${page.path == currentPage.path ? 'cl-header__mobile-link--active' : ''}"
						>
							${page.title || page.name}
						</a>
					</li>
				</ul>
			</nav>

			<!-- Mobile utility links -->
			<div class="cl-header__mobile-utils">
				<ul
					class="cl-header__mobile-utils-list"
					data-sly-test="${header.utilLinks.size > 0}"
				>
					<li data-sly-list.link="${header.utilLinks}">
						<sly data-sly-test="${link.url}">
							<a
								href="${link.url @ extension='html'}"
								class="cl-header__mobile-utils-link"
							>
								<span class="cl-header__mobile-utils-text">${link.label}</span>
								<i
									class="cl-header__mobile-utils-icon cl-icon-${link.icon}"
									data-sly-test="${link.icon}"
								></i>
							</a>
						</sly>
						<sly data-sly-test="${!link.url}">
							<span class="cl-header__mobile-utils-link">
								<span class="cl-header__mobile-utils-text">${link.label}</span>
								<i
									class="cl-header__mobile-utils-icon cl-icon-${link.icon}"
									data-sly-test="${link.icon}"
								></i>
							</span>
						</sly>
					</li>
				</ul>
				<div class="cl-header__mobile-lang">
					<a
						href="#"
						class="cl-header__mobile-utils-link cl-header__mobile-utils-link--lang"
					>
						${properties.languageLabel || 'IT'}
						<i
							class="cl-header__lang-caret cl-icon-chevron"
							aria-hidden="true"
						></i>
					</a>
				</div>
			</div>
		</div>
	</div>
</div>

<sly
	data-sly-resource="/content/codehills/jcr:content/codeland-header"
	data-sly-test.isHomepage="${!isHomepage}"
/>
