<sly data-sly-use.list="com.adobe.cq.wcm.core.components.models.List" />

<div>Year: ${properties.year}</div>

<div
	class="cn-loadmore-list"
	data-limit="${properties.itemsPerLoad || 3}"
	data-endpoint="${resource.path}.loadmore.json"
>
	<div class="cn-loadmore-grid cn-pages-grid cn-pages-grid--cols-${properties.columns || '3'}">
		<!-- Items inserted by JS -->
	</div>

	<div class="text-center mt-3">
		<button
			class="cn-loadmore-btn btn btn-outline-primary"
			type="button"
		>
			Load More
		</button>
	</div>
</div>

<div
	data-sly-test="${list.listItems.size == 0 && wcmmode.edit}"
	class="cn-pages-grid-empty text-muted"
>
	<span>Configure the Load More List list settings.</span>
</div>
