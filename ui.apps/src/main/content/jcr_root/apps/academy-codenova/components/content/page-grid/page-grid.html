<sly data-sly-use.list="com.adobe.cq.wcm.core.components.models.List" />
<sly data-sly-use.pagination="${'com.reponse.mvn.core.models.PaginationModel' @ resource=resource}" />
<sly data-sly-test.hasItems="${list && list.listItems && !list.listItems.isEmpty}">
	<!-- Grid of pages -->
	<div class="cn-pages-grid cn-pages-grid--cols-${properties.columns || '3'}">
		<sly data-sly-list.item="${pagination.paginatedItems}">
			<article class="cn-pages-grid__card">
				<a
					class="cn-pages-grid__link"
					href="${item.URL}"
				>
					<sly data-sly-test="${properties.showImage}">
						<div class="cn-pages-grid__image">
							<sly data-sly-test.hasImage="${item.imagePath}">
								<img
									src="${item.imagePath}"
									alt="${item.title}"
									loading="lazy"
								/>
							</sly>

							<sly data-sly-test="${!hasImage}">
								<div class="cn-pages-grid__image-placeholder">
									<span class="cn-pages-grid__image-initials"></span>
								</div>
							</sly>
						</div>
					</sly>

					<h3 class="cn-pages-grid__title">${item.title}</h3>

					<sly data-sly-test="${properties.showDescription && item.description}">
						<p class="cn-pages-grid__description">${item.description}</p>
					</sly>
				</a>
			</article>
		</sly>
	</div>

	<!-- Pagination -->
	<sly data-sly-test="${pagination.totalPages > 1}">
		<nav
			class="cn-pages-grid__pagination"
			aria-label="Pagination"
		>
			<ul class="cn-pages-grid__pagination-list">
				<li
					class="cn-pages-grid__pagination-item"
					data-sly-test="${pagination.currentPage > 1}"
				>
					<a
						class="cn-pages-grid__pagination-link"
						href="${currentPage.path}.page${pagination.previousPage}.html"
					>
						Previous
					</a>
				</li>

				<li
					class="cn-pages-grid__pagination-item"
					data-sly-list.page="${pagination.pageNumbers}"
				>
					<span
						class="cn-pages-grid__pagination-link cn-pages-grid__pagination-link--active"
						data-sly-test="${page == pagination.currentPage}"
						aria-current="page"
					>
						${page}
					</span>

					<a
						class="cn-pages-grid__pagination-link"
						data-sly-test="${page != pagination.currentPage}"
						href="${currentPage.path}.page${page}.html"
					>
						${page}
					</a>
				</li>

				<li
					class="cn-pages-grid__pagination-item"
					data-sly-test="${pagination.currentPage < pagination.totalPages}"
				>
					<a
						class="cn-pages-grid__pagination-link"
						href="${currentPage.path}.page${pagination.nextPage}.html"
					>
						Next
					</a>
				</li>
			</ul>
		</nav>
	</sly>
</sly>

<!-- Author-time placeholder when empty -->
<div
	data-sly-test="${(!hasItems) && wcmmode.edit}"
	class="cn-pages-grid-empty text-muted"
>
	<span>Configure the Pages Grid list settings.</span>
</div>
