<sly data-sly-use.nav="com.reponse.mvn.core.models.NavigationModel" />
<sly data-sly-set.useCustomLogo="${properties.logoMode == 'custom'}" />
<sly data-sly-set.hasLogoAsset="${properties.logoAssetReference}" />
<sly data-sly-set.utilityResourcePath="${resource.parent.path}/header-utility" />
<sly data-sly-set.rootPath="${nav.rootPagePath}" />

<div class="cl-header__main">
	<div class="cl-container">
		<div class="cl-header__main-inner">
			<a
				href="${rootPath @ extension='html'}"
				class="cl-header__logo"
				data-sly-test="${rootPath}"
			>
				<i
					class="cl-icon-${properties.logoIcon || 'logo'}"
					aria-label="${properties.logoAltText || 'Codeland'}"
					data-sly-test="${!useCustomLogo || !hasLogoAsset}"
				></i>
				<img
					class="cl-header__logo-image"
					src="${properties.logoAssetReference}"
					alt="${properties.logoAltText || 'Codeland'}"
					height="50"
					loading="eager"
					data-sly-test="${useCustomLogo && hasLogoAsset}"
				/>
			</a>
			<a
				href="#"
				class="cl-header__logo"
				data-sly-test="${!rootPath}"
			>
				<i
					class="cl-icon-${properties.logoIcon || 'logo'}"
					aria-label="${properties.logoAltText || 'Codeland'}"
					data-sly-test="${!useCustomLogo || !hasLogoAsset}"
				></i>
				<img
					class="cl-header__logo-image"
					src="${properties.logoAssetReference}"
					alt="${properties.logoAltText || 'Codeland'}"
					height="50"
					loading="eager"
					data-sly-test="${useCustomLogo && hasLogoAsset}"
				/>
			</a>

			<nav class="cl-header__nav">
				<ul class="cl-header__nav-list">
					<li
						data-sly-repeat.page="${nav.visibleRootChildren}"
					>
						<a
							href="${page.path @ extension='html'}"
							class="cl-header__nav-link ${page.path == currentPage.path ? 'cl-header__nav-link--active' : ''}"
						>
							${page.title || page.name}
						</a>
					</li>
				</ul>
			</nav>

			<div class="cl-header__actions">
				<button
					class="cl-header__search"
					aria-label="Search"
				>
					<i class="cl-icon-search"></i>
				</button>
				<button
					class="cl-header__toggle"
					aria-label="Toggle menu"
					data-header-toggle
				>
					<span class="cl-header__toggle-bar"></span>
					<span class="cl-header__toggle-bar"></span>
					<span class="cl-header__toggle-bar"></span>
				</button>
			</div>
		</div>
	</div>
</div>

<div
	class="cl-header__mobile"
	data-header-menu
>
	<div class="cl-header__mobile-inner">
		<div class="cl-header__mobile-header">
			<a
				href="${rootPath @ extension='html'}"
				class="cl-header__logo"
				data-sly-test="${rootPath}"
			>
				<i
					class="cl-icon-${properties.logoIcon || 'logo'}"
					aria-label="${properties.logoAltText || 'Codeland'}"
					data-sly-test="${!useCustomLogo || !hasLogoAsset}"
				></i>
				<img
					class="cl-header__logo-image"
					src="${properties.logoAssetReference}"
					alt="${properties.logoAltText || 'Codeland'}"
					height="50"
					loading="eager"
					data-sly-test="${useCustomLogo && hasLogoAsset}"
				/>
			</a>
			<a
				href="#"
				class="cl-header__logo"
				data-sly-test="${!rootPath}"
			>
				<i
					class="cl-icon-${properties.logoIcon || 'logo'}"
					aria-label="${properties.logoAltText || 'Codeland'}"
					data-sly-test="${!useCustomLogo || !hasLogoAsset}"
				></i>
				<img
					class="cl-header__logo-image"
					src="${properties.logoAssetReference}"
					alt="${properties.logoAltText || 'Codeland'}"
					height="50"
					loading="eager"
					data-sly-test="${useCustomLogo && hasLogoAsset}"
				/>
			</a>
			<button
				class="cl-header__close"
				aria-label="Close menu"
				data-header-toggle
			>
				<i class="cl-icon-close"></i>
			</button>
		</div>

		<nav class="cl-header__mobile-nav">
			<ul class="cl-header__mobile-list">
				<li
					data-sly-repeat.page="${nav.visibleRootChildren}"
				>
					<a
						href="${page.path @ extension='html'}"
						class="cl-header__mobile-link ${page.path == currentPage.path ? 'cl-header__mobile-link--active' : ''}"
					>
						${page.title || page.name}
					</a>
				</li>
			</ul>
		</nav>
		<sly
			data-sly-resource="${utilityResourcePath @ resourceType='academy-codenova/components/structure/header/header-utility', wcmmode='disabled', decoration=false}"
		/>
	</div>
</div>
