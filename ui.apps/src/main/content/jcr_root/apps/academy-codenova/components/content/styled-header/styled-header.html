<sly data-sly-use.model="com.reponse.mvn.core.models.AcademyLearningDemo"></sly>

<div
	class="container py-4 py-lg-5 cmp-styled-header"
	data-sly-test="${model.title || model.subtitle || model.customDescription}"
>
	<div class="${model.alignmentClass}">
		<div
			data-sly-test="${model.subtitle}"
			class="cmp-styled-header__subtitle cmp-styled-header__subtitle--${model.position} small mb-2"
		>
			${model.subtitle}
		</div>

		<h2
			data-sly-test="${model.title}"
			class="cmp-styled-header__title display-5 fw-bold mb-3"
		>
			${model.title}
		</h2>

		<p
			data-sly-test="${model.customDescription}"
			class="cmp-styled-header__description text-body-secondary mb-0"
		>
			${model.customDescription}
		</p>
	</div>
</div>
