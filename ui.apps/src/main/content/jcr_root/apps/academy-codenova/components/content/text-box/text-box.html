<div class="${['cl-text-box', properties.margin] @ join=' ', context='attribute'}">
	<div class="cl-text-box__inner">
		<div
			class="cl-text-box__title"
			data-sly-resource="${'title' @ resourceType='academy-codenova/components/atomic/title'}"
		></div>

		<div
			class="cl-text-box__description"
			data-sly-resource="${'text' @ resourceType='academy-codenova/components/atomic/text'}"
		></div>
	</div>
</div>
