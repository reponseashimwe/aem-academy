<div class="cn-cookie-alert alert alert-dismissible fade show alert-${properties.alertType || 'info'}" role="alert">
    <div class="mb-2">${properties.message || 'We use cookies. Accept or reject to continue.'}</div>
    <div class="d-flex gap-2">
        <button type="button" class="btn btn-sm btn-primary cn-cookie-alert__accept">Accept</button>
        <button type="button" class="btn btn-sm btn-outline-secondary cn-cookie-alert__reject">Reject</button>
    </div>
</div>
