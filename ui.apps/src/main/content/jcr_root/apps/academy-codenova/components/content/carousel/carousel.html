<div data-sly-test="${resource.slides}" class="d-flex overflow-auto gap-3 py-3">
    <sly data-sly-list.slide="${resource.slides.listChildren}">
        <div class="flex-shrink-0" style="width: 280px;">
            <sly data-sly-test="${slide.valueMap.image}">
                <sly data-sly-test="${slide.valueMap.link}">
                    <a href="${slide.valueMap.link}">
                        <img class="img-fluid rounded w-100" src="${slide.valueMap.image}" alt="${slide.valueMap.title || 'Slide'}" loading="lazy"/>
                    </a>
                </sly>
                <sly data-sly-test="${!slide.valueMap.link}">
                    <img class="img-fluid rounded w-100" src="${slide.valueMap.image}" alt="${slide.valueMap.title || 'Slide'}" loading="lazy"/>
                </sly>
            </sly>
            <sly data-sly-test="${slide.valueMap.title}" class="small fw-medium mt-1 d-block">${slide.valueMap.title}</sly>
        </div>
    </sly>
</div>
<div data-sly-test="${!resource.slides || !resource.slides.hasChildren}"
     class="d-flex align-items-center justify-content-center rounded bg-light text-muted small cn-carousel-empty">
    <span>Add slides in the dialog</span>
</div>
