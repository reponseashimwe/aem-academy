<div class="cn-hero-slide">
    <div class="cn-hero-slide__media">
        <sly data-sly-test.hasImage="${properties.image}">
            <div class="cn-hero-slide__media-inner">
                <img src="${properties.image}"
                     alt="${properties.title || 'Hero slide image'}"
                     loading="lazy"/>
            </div>
        </sly>
        <sly data-sly-test="${!hasImage && wcmmode.edit}">
            <div class="cn-hero-slide__media-inner cn-hero-slide__media-inner--placeholder">
                <span>Configure an image for this slide</span>
            </div>
        </sly>
    </div>

    <div class="cn-hero-slide__content-container">
        <div class="cn-hero-slide__content text-center text-md-start">
            <span data-sly-test="${properties.pretitle}"
                  class="cn-hero-slide__pretitle text-uppercase small fw-semibold d-block">
                ${properties.pretitle}
            </span>
            <h1 class="cn-hero-slide__title display-4 fw-bold mb-3">
                ${properties.title || 'Welcome to Our Platform'}
            </h1>
            <p data-sly-test="${properties.subtitle}"
               class="cn-hero-slide__subtitle lead mb-4">
                ${properties.subtitle}
            </p>

            <div class="cn-hero-slide__cta d-flex flex-wrap justify-content-center justify-content-md-start gap-3"
                 data-sly-test="${resource.ctas && resource.ctas.hasChildren}">
                <sly data-sly-list.cta="${resource.ctas.listChildren}">
                    <a href="${cta.valueMap.link || '#'}"
                       class="btn ${cta.valueMap.variant == 'outline' ? 'btn-outline-light' : (cta.valueMap.variant == 'ghost' ? 'btn-link text-white' : 'btn-light') }">
                        ${cta.valueMap.label || 'Learn more'}
                    </a>
                </sly>
            </div>
        </div>
    </div>
</div>
