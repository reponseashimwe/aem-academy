<sly data-sly-use.model="${'com.reponse.mvn.core.models.CourseListModel'}">

<div class="cl-news__slider-wrap">
	<div
		class="swiper cl-news__slides"
		data-news-slides
		data-news-loop="${properties.loop != 'false' ? 'true' : 'false'}"
	>
		<div class="swiper-wrapper">

			<sly data-sly-test="${model.courses.empty && wcmmode.edit}">
				<div class="swiper-slide">
					<article class="cl-news-card">
						<div class="cl-news-card__content" style="padding: 2rem; font-family: monospace; color: #01334b;">
							No courses found — check the Courses Root Path in the dialog.
						</div>
					</article>
				</div>
			</sly>

			<sly data-sly-list.course="${model.courses}">
				<sly data-sly-test="${!wcmmode.edit || courseList.index < 10}">
					<div class="swiper-slide" data-tags="${course.tags @ join=','}">
						<article class="cl-news-card">
							<div class="cl-news-card__image">
								<a href="${course.link @ context='uri'}" class="cl-news-card__image-link">
								<sly data-sly-set.cardImg="${course.fileTransform279x180 || course.fileReference || course.fileOriginal}"/>
								<img
									data-sly-test="${cardImg}"
									src="${cardImg @ context='uri'}"
									alt="${course.title @ context='attribute'}"
									loading="lazy"/>
								<img
									data-sly-test="${!cardImg}"
									src="/etc.clientlibs/academy-codenova/clientlibs/clientlib-site/resources/images/course-default.avif"
									alt="${course.title @ context='attribute'}"
									loading="lazy"/>
								</a>
							</div>
							<div class="cl-news-card__body">
								<time class="cl-news-card__date">${course.formattedStartDate}</time>
								<div class="cl-news-card__tags">
									<sly data-sly-list.tag="${course.tags}">
										<span class="cl-news-card__tag">${tag}</span>
									</sly>
								</div>
								<h3 class="cl-news-card__title">
									<a href="${course.link @ context='uri'}" class="cl-news-card__title-link">${course.title}</a>
								</h3>
								<p class="cl-news-card__desc">${course.abstract}</p>
								<a href="${course.showMoreLink @ context='uri'}" class="cl-news-card__link">
									Show More <i class="cl-icon-arrow_forward"></i>
								</a>
							</div>
						</article>
					</div>
				</sly>
			</sly>

		</div>
	</div>

	<div class="cl-news__nav">
		<div class="cl-news__dots" data-news-dots data-sly-test="${!model.hideDots}"></div>
		<div class="cl-slider__arrows" data-sly-test="${!model.hideNavigation}">
			<button
				class="cl-slider__arrow cl-news__arrow--prev"
				data-news-prev
				aria-label="Previous slide"
			>
				<i class="cl-icon-chevron u-rotate-180"></i>
			</button>
			<button
				class="cl-slider__arrow cl-news__arrow--next"
				data-news-next
				aria-label="Next slide"
			>
				<i class="cl-icon-chevron"></i>
			</button>
		</div>
	</div>
</div>

</sly>
